<div id="$r.getCId()" class="o_iframedisplay">
	#if ($r.available("command.download"))
		$r.render("command.download")
	#end
	
	## NOTE:  allowfullscreen="true" is necessary for the mediaelement video player to play videos in fullscreen
	#if ($isAbsoluteURI)
		<iframe name="$frameId" id="$frameId" src="${currentURI}" frameborder="0" title="$r.translateInAttribute("iframe.content")" height="$iframeHeight" allowfullscreen="true" ></iframe>
	#else
		<iframe name="$frameId" class="o_iframe_rel" id="$frameId" src="${baseURI}/${currentURI}${token}" frameborder="0" height="$iframeHeight" style="min-height:${iframeHeight}px" allowfullscreen="true"></iframe>
	#end
	
	#if($r.isTrue($adjustAutoHeight))
		<script>
		## Init the iFrame to the max height possible.
		jQuery(function() {b_resizeIframeToMainMaxHeight("$frameId");});
		#if($r.isTrue($iframeResizer))
		registerIFrameAndObserve("$frameId", $debug);
		#end
		</script>
	#end
	$r.render("newUriEvent")
</div>
