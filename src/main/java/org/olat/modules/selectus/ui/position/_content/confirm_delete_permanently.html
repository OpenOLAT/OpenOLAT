<fieldset #if(!$!f.domReplacementWrapperRequired) id="$r.getCId()" #end class="o_form form-horizontal #if ($off_css_class) $off_css_class #end $f.getContainerCssClass()">
	<div class="dialog">
		<div class="o_warning"><p>$r.xssScan($message)</p></div>
	</div>
	<div class="form-group o_sel_confirm #if($f.hasError("confirm.delete")) has-feedback has-error #end clearfix">
		$r.render("confirm.delete", "3_9")
	</div>
	<div class="o_button_group">
		$r.render("delete")
		$r.render("cancel")				
	</div>
</fieldset>
