<div class="o_login fx_recruiting_login">
	#if ($infomsg)
		<div class="o_infomessage_wrapper">
			<div class="o_infomessage">
				<div class="o_infomessage_inner">
					<div class="b_floatscrollbox">
						$infomsg
					</div>
				</div>
			</div>
		</div>
	#end
	#if ($infomsgNode)
		<div class="o_infomessage_wrapper">
			<div class="o_infomessage">
				<div class="o_infomessage_inner">
					<div class="b_floatscrollbox">
						$infomsgNode
					</div>
				</div>
			</div>
		</div>
	#end
	#if($browserWarningOn)
		<div class="b_warning">
			$r.translate("login.browserswitch")
		</div>
	#end
	$r.render("loginComp")
</div>
