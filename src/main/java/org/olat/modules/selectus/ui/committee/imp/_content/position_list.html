<fieldset #if(!$!f.domReplacementWrapperRequired) id="$r.getCId()" #end class="o_form #if ($off_css_class) $off_css_class #end $f.getContainerCssClass()">
#if ($off_desc || $off_warn || $off_info)
	<div class="row"><div class="col-sm-12">
		#if ($off_desc) <div class="o_desc">$off_desc</div> #end
		#if ($off_warn) <div class="o_warning">$off_warn</div> #end
		#if ($off_info) <div class="o_info">$off_info</div> #end
	</div></div>
#end
#if($f.hasError("table"))
<div class="o_block_bottom">
	$r.render("table","error")
</div>
#end
$r.render("table")
</fieldset>
