mail.templates.description=You can customize system mail templates of activated functions or - if already customized - reset them to their original version.<br>You can also create additional position-specific mail templates for the contacting of applicants by clicking on the button "$\:add.template". Existing position templates can be edited or deleted, but not reset to a previous version.
mail.templates.description.with.letter=Mail templates with form letter include an attached form letter in PDF-Format. The text in the form letter can only be customized/defined/edited here, but not when sending emails to applicants. Note that also the text in the form letter will be reset, when resetting a system mail template with form letter.
mail.templates.description.with.management=The "Confirmation of application w/o referee management" is enabled and automatically sent to applicants if the feature "Applicants can provide and manage referees" is not enabled.<br>The "Confirmation of application with referee management" is enabled and automatically sent to applicants if the feature "Applicants can provide and manage referees" is enabled.<br>Please go to "<a href\='{0}'>Referee / expert</a>" in the main navigation of the edit mode to configure referees and their management.
