apply_application.email.referee.mgmt=<p>Automatisch erstellte Eingangsbest\u00E4tigung</p><p>$applicantDearTitleName</p><p>Wir danken Ihnen f\u00FCr Ihre Bewerbung auf die "$positionTitle". Ihre Unterlagen werden der zust\u00E4ndigen Berufungskommission weitergeleitet.</p><p>Als Teil Ihrer Bewerbung ben\u00F6tigt die Kommission Empfehlungsschreiben. Bitte folgen Sie dem nachstehenden Link, um sich in das Faculty Recruiting Tool einzuloggen und den Status Ihrer Referenzen zu verfolgen. Sie k\u00F6nnen zus\u00E4tzliche Referenzpersonen bestimmen, falls diese die Bitte um ein Referenzschreiben ablehnen. Eingereichte Referenzschreiben sind vertraulich und f\u00FCr Sie nicht einsehbar.<br>$applicantURL</p><p>Die Beurteilung der Bewerbungen wird einige Zeit in Anspruch nehmen. Sobald die Kommission eine Entscheidung getroffen hat, werden wir Sie informieren.</p><p>Freundliche Gr\u00FCsse</p>
