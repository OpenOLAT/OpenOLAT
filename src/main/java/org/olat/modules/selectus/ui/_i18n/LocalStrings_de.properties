rejection.mail.bonhold.subject=Ihre Bewerbung an die Universit\u00E4t OpenOlat
rejection.mail.bonhold.body=$dearTitleAndName\n\nSie haben sich auf die "{0}" beworben. Wir danken Ihnen f\u00FCr Ihr damit bekundetes Interesse an einer T\u00E4tigkeit an der Universit\u00E4t OpenOlat. \n\nLeider muss ich Ihnen mitteilen, dass die zust\u00E4ndige Berufungskommission nach eingehender Pr\u00FCfung Ihrer Bewerbung entschieden hat, Ihre Bewerbung nicht in die engste Wahl f\u00FCr die ausgeschriebene Stelle aufzunehmen. Ihr Einverst\u00E4ndnis vorausgesetzt, m\u00f6chte die Kommission Ihre Bewerbung jedoch noch pendent halten. Ihre elektronisch eingereichten Bewerbungsunterlagen w\u00FCrden erst nach dem endg\u00FCltigen Abschluss des Berufungsverfahrens gel\u00f6scht, wir w\u00FCrden Sie wieder dar\u00FCber informieren.\n\nFreundliche Gr\u00FCsse\n\nProf. Dr. {2}\nPr\u00E4sidium der Berufungskommission\nUniversit\u00E4t OpenOlat
rejection.mail.crejection.subject=Ihre Bewerbung an die Universit\u00E4t OpenOlat
rejection.mail.crejection.body=$dearTitleAndName\n\nSie haben sich auf die "{0}" beworben. Wir danken Ihnen f\u00FCr Ihr damit bekundetes Interesse an einer T\u00E4tigkeit an der Universit\u00E4t OpenOlat.\n\nLeider muss ich Ihnen mitteilen, dass die zust\u00E4ndige Berufungskommission entschieden hat, Ihre Bewerbung im weiteren Verfahren nicht mehr zu ber\u00FCcksichtigen.\n\nIhre elektronischen Bewerbungsunterlagen werden aus datenschutzrechtlichen Gr\u00FCnden gel\u00f6scht.\n\nIm Namen der Kommission w\u00FCnsche ich Ihnen f\u00FCr Ihre wissenschaftliche Laufbahn viel Erfolg und alles Gute.\n\nFreundliche Gr\u00FCsse\n\nProf. Dr. {2}\nPr\u00E4sidium der Berufungskommission\nUniversit\u00E4t OpenOlat
