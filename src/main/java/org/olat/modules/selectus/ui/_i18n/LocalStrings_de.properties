disclaimer.privacy.text=<h5>Datenerhebung</h5><p>Bei der Benutzung von Selectus werden Daten gespeichert. Aus Gr\u00FCnden der Nachvollziehbarkeit gilt dies auch dann, wenn der Prozess abgebrochen wird.</p><p>Es werden pers\u00F6nliche Daten erhoben wie Name, Email und Adresse. Eingereichte Daten und Dokumente sind f\u00FCr die beurteilende Kommission und gegebenenfalls auch f\u00FCr Experten und Gutachter sichtbar. Des Weiteren werden Online-Daten wie IP-Adresse, Standort, Browserversion und Zugriffsdatum und -zeit erfasst. Diese Daten werden zu Zwecken der Nachvollziehbarkeit in Logfiles gespeichert.</p><p>Nach Abschluss eines Verfahrens werden die Daten f\u00FCr weitere zwei Jahre aufbewahrt und danach endg\u00FCltig gel\u00F6scht.</p><h5>Datentransfer</h5><p>S\u00E4mtlicher Datenverkehr ist verschl\u00FCsselt. Die Server zur Datenspeicherung sind im Besitz der frentix GmbH und befinden sich in der Schweiz.</p><h5>Daten l\u00F6schen oder einsehen</h5><p>Antr\u00E4ge zur L\u00F6schung oder zum Einsehen Ihrer Daten senden Sie bitte an datenschutz@frentix.com. Nach der L\u00F6schung verbleiben die Daten f\u00FCr weitere drei Monate in den Backups, bevor sie endg\u00FCltig gel\u00F6scht werden. Datenexporte geben keine Einsicht in die Bewertung oder Beurteilung Ihrer Bewerbung.</p><h5>Akzeptieren</h5>
