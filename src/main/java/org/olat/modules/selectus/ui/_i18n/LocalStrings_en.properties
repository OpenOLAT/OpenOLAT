reference.expert.mail.body=<p>Dear $refereeFullName,</p><p>I am writing to you regarding the application of $applicantFullName.</p><p>I very much appreciate you taking the time to review for this application.</p><p>You can follow the link:<br>$refereeURL</p><p>Yours sincerely<br>$!headFirstname $!headLastname<br />Head of the Committee</p>
reference.recommendation.mail.body=<p>$refereeDearTitleName,</p><p>$applicantTitleFirstLastname has applied for the position "$positionTitle" and has indicated your contact details in order to request a letter of recommendation from you.</p><p>We would therefore greatly appreciate if you could provide a letter of recommendation until $referenceDeadline.</p><p>Please follow the link below to accept the request and upload your recommendation letter. Should this not be possible, we kindly ask you to let us know by following the same link and declining the request:<br>$refereeURL</p><p>Yours sincerely,<br>$!headFirstname $!headLastname<br>Head of the Committee</p>
reference.comparative.expert.mail.body=<p>$refereeDearTitleName,</p><p>I am writing you regarding the recruitment at ABC University for the open position "$positionTitle".</p><p>The Search Committee is considering the following candidates for this position:<br>$applicantList</p><p>As you are an expert in this field, we would be very grateful for your willingness to help us with the evaluation and thus to write a comparative assessment of the suitability of these candidates for the open position. We look forward to receiving your expert assessment at your earliest convenience, but no later than $refereeDeadline.</p><p>Please follow the link below to accept our request, obtain information about both the candidates and the profile of the position and to upload your expert assessment as a single PDF file. Should you not be available as an expert, we kindly ask you to let us know by following the same link and declining the request:<br>$refereeUrl</p><p>Yours sincerely,<br>$headFirstname $headLastname<br>Head of the Search Committee</p>
reference.reminder.comparative.expert.mail.body=<p>$refereeDearTitleName,</p><p>This reminder to submit a comparative assessment is sent to you on behalf of $applicationList. Please find the original request below.</p><hr>{0}
