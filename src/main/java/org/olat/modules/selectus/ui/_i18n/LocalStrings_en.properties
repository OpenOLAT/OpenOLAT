edit.rating.policy.ratings.a=<strong><span class="o_rating_expl" title="A">A</span> = top candidate</strong> (will be invited for a scientific talk and interview with the committee)
edit.rating.policy.ratings.b=<strong><span class="o_rating_expl" title="B">B</span> = reserve candidate</strong> (will not be invited at this stage but kept on the list)
