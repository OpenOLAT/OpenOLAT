rejection.mail.-.subject=Confidential - {0}
rejection.mail.body=Dear $nameAndTitle\n\nI am writing to you regarding your application for the above-mentioned position.\n\nThe selection committee advising me in this matter has meanwhile studied the applications carefully. After extensive discussions, the members of this board recommended that I consider other candidates for the selection process. I have decided to follow this recommendation and regret to inform you that your candidacy will, therefore, not be pursued any further.\n\nI very much appreciate you taking the time to apply for this position and wish you every success in your career.\n\nYours sincerely\n\n$headFirstname $headLastname\nHead of the Committee

rejection.mail.bonhold.subject=Your application at the University of OpenOlat
rejection.mail.bonhold.body=$dearTitleAndName,\n\nWe very much appreciate you having taken the time to apply for the "{0}". We also thank you for your interest in the University of OpenOlat.\n\nWe regret to inform you of the committee's decision not to advance your application to the next stage of the selection process. But the selection committee would like to keep your application pending until the end of the application procedure if you agree. Afterwards we will delete it to protect your privacy. You will be informed accordingly.\n\nYours sincerely,\n\nProf. Dr. {2}\nHead of Committee\nUniversity of OpenOlat\n\n

rejection.mail.crejection.subject=Your application at the University of OpenOlat
rejection.mail.crejection.body=$dearTitleAndName\n\nWe very much appreciate you having taken the time to apply for the "{0}". We also thank you for your interest in the University of OpenOlat.\n\nI regret to inform you that the search committee has not selected you for the position. For reasons of data protection, your dossier will be deleted.\n\nOn behalf of the search committee, I would like to wish you all the best in your future endeavors.\n\nYours sincerely,\n\nProf. Dr. {2}\nHead of Committee\nUniversity of OpenOlat

