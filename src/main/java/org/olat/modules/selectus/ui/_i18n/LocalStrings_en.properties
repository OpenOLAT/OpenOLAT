delete.position.anonymous.hint2=2) If you click on "$\:delete.position.anonymous" the position and all its documents and all its data that allows to identify any persons (applicants, committee members, referees/experts etc.) will be deleted irrevocably. The position cannot be accessed or changed anymore (except the tab \u201EReporting\u201C). Only certain anonymized data will be kept for statistical reporting.
