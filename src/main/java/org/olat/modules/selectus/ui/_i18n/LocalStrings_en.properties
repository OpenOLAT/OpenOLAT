edit.form_title=Position form
edit.form_description=Fill out the form below to create a new position. Use the position status to publish the open position or leave it in preparation status. All fields can be modified at a later stage.
edit.form_description.comparative.experts=Select whether staff can add experts for a comparative assessment of several applications, and if so, configure the details below. Such an expert gets access to a set of applications and can upload a single file with a comparative assessment of these applications.<br>After enabling experts for comparative assessments, you can configure the visibility of the different elements of the applications to these experts in the tab "$\:edit.step.references.visibility".
edit.form_description.configuration=Configure the position below by choosing the options that are relevant for this position. All fields can be modified at a later stage.
edit.form_description.decision=Enable/disable the decision tool, which can be used during a committee meeting. Decision rubrics can be created directly in the tool.
edit.form_description.document=Choose from the list below which documents you require for the position. Click on "Edit" to adjust further details of a document.
edit.form_description.experts=Select whether staff can add experts, and if so, configure the details below. An expert gets access to a single application and can upload a file with an expert assessment of this application.<br>After enabling experts, you can configure the visibility of the different elements of the applications to these experts in the tab "$\:edit.step.references.visibility".
edit.form_description.referees=Select whether staff can add experts and whether applicants can provide referees. If so, you can configure the details below. All fields can be modified at a later stage.
edit.form_description.referees.management=Select whether applicants can provide and manage referees, and if so, configure the details below.<br>Note that, if applicants can manage referees, the email to referees will always be sent immediately after application submission.<br>After enabling referees, you can configure the visibility of the different elements of the applications to the referees in the tab "$\:edit.step.references.visibility".
edit.form_description.status=Define the indicated deadlines and configure whether committee members who have not yet given a rating should be reminded automatically by email. Use the position status to publish the open position or leave it in preparation status. All fields can be modified at a later stage.
