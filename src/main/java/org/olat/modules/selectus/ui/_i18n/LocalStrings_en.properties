edit.rating.policy.points.confidentiality=We kindly ask you to treat all information and documents as strictly confidential. All documents and oral information regarding the candidates, which the selection committee acquires throughout the preparation of the selection procedure, are subject to confidentiality.<br/>The documents are intended exclusively for the members of the selection committee. Documents must neither be copied nor made accessible in any other way to a third party. Any download of documents or printout must be deleted or destroyed after the closure of the procedure.<br/>Your ratings in the tool are anonymised for the staff, the head of the committee and the other committee members.<br/>Your comments are personal. The staff, the head of the committee and the other committee members have no access. After the closure of the whole procedure, all relevant data will be deleted from the server.
edit.rating.policy.points.confidentiality.title=Confidentiality\:
edit.rating.policy.points.focus=The prime focus is on excellence in both science and teaching. A perfect fit to the profile is considered secondary.
edit.rating.policy.points.focus.title=Focus on excellence\:
edit.rating.policy.points.introduction=It is customary that qualified scientists who have not applied and are therefore not on the list of applicants can be introduced at any stage of the selection procedure. We strongly encourage all members of the selection committee to think about potential top candidates and either bring their curriculum vitae and publication lists to the meetings or send them to us in advance, so that we can forward them to all the committee members beforehand.
edit.rating.policy.points.introduction.title=Introduction of potential candidates\:
edit.rating.policy.points.women=In order to increase the number of women in leading academic positions, the faculty prefers female over male applicants given similar scientific and teaching qualifications.
