disclaimer.privacy.title=Service and data policy
disclaimer.privacy.text=<h5>Data collection</h5><p>By using Selectus, data is saved. For reasons of traceability, this also applies if the process is interrupted.</p><p>Personal data such as name, email and address are collected. Submitted data and documents are visible to the evaluating commission and, if applicable, to experts and reviewers. In addition, online data such as IP address, location, browser version and access date and time are recorded. This data is stored in log files for traceability purposes.</p><p>Once the procedure has been completed, the data will be kept for a further two years and then definitively deleted.</p><h5>Data transfer</h5><p>All data traffic is encrypted. The servers for data storage are owned by frentix GmbH and are located in Switzerland.</p><h5>Delete or view data</h5><p>Please send requests to delete or view your data to datenschutz@frentix.com. After deletion, the data will remain in the backups for a further three months before being finally deleted. Data exports do not give any insight into the evaluation or assessment of your application.</p><h5>Confirmation</h5>
