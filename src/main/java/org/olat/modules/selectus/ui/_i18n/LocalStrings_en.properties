edit.steps.explain=<p>Click on "$\:edit.steps" to enable/disable the steps that should appear in the application workflow.<br>Click on the respective steps to customize and preview its content. The customization options may differ in the different steps.</p><ul><li>Adapt the instructions and help texts visible in the different steps of the application workflow.</li><li>Add customized questions to the steps "$:edit.step.personal.data", "$:edit.step.academical.background", and "$:edit.step.project".</li><li>Choose which documents are required from applicants in the step "$:edit.step.documents".</li><li>Configure the feedback options in the step "$:edit.step.review.and.submit".</li><li>Adapt the confirmation text and email applicants receive after submitting their application in the step "$:edit.step.confirmation".</li><li>Please note, that referees can be configured in the tab "Referee / expert" in the main navigation of the edit mode.</li></ul>
