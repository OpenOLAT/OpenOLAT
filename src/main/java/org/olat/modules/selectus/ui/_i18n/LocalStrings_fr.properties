rejection.mail.body=Dear $nameAndTitle\n\nJe vous \u00E9cris au sujet de votre candidature au poste susmentionn\u00E9.\n\nLe comit\u00E9 de s\u00E9lection qui me conseille dans cette affaire a entre-temps \u00E9tudi\u00E9 attentivement les candidatures. Apr\u00E8s de longues discussions, les membres de ce comit\u00E9 m'ont recommand\u00E9 d'examiner d'autres candidatures dans le cadre du processus de s\u00E9lection. J'ai d\u00E9cid\u00E9 de suivre cette recommandation et j'ai le regret de vous informer que votre candidature ne sera donc pas retenue.\n\nJe vous remercie sinc\u00E8rement d'avoir pris le temps de postuler \u00E0 ce poste et vous souhaite beaucoup de succ\u00E8s dans votre carri\u00E8re.\n\nCordialement,\n\n$headFirstname\n$headLastname\nResponsable du comit\u00E9
rejection.mail.bonhold.subject=Votre candidature \u00E0 l'universit\u00E9 OpenOlat
rejection.mail.bonhold.body=$dearTitleAndName,\n\nNous vous remercions sinc\u00E8rement d'avoir pris le temps de postuler au programme "{0}". Nous vous remercions \u00E9galement de l'int\u00E9r\u00EAt que vous portez \u00E0 l'universit\u00E9 OpenOlat.\n\nNous avons le regret de vous informer que le comit\u00E9 a d\u00E9cid\u00E9 de ne pas retenir votre candidature pour la prochaine \u00E9tape du processus de s\u00E9lection. Toutefois, le comit\u00E9 de s\u00E9lection souhaite conserver votre candidature jusqu'\u00E0 la fin de la proc\u00E9dure de candidature, si vous y consentez. Nous la supprimerons ensuite afin de prot\u00E9ger votre vie priv\u00E9e. Vous en serez inform\u00E9(e) en cons\u00E9quence.\n\nCordialement,\n\nProf. Dr. {2}\nPr\u00E9sident du comit\u00E9\nUniversit\u00E9 OpenOlat
rejection.mail.crejection.subject=Votre candidature \u00E0 l'universit\u00E9 OpenOlat
rejection.mail.crejection.body=$dearTitleAndName\n\nNous vous remercions sinc\u00E8rement d'avoir pris le temps de postuler au poste "{0}". Nous vous remercions \u00E9galement de l'int\u00E9r\u00EAt que vous portez \u00E0 l'universit\u00E9 OpenOlat.\n\nPour des raisons de protection des donn\u00E9es, votre dossier sera supprim\u00E9.\n\nAu nom du comit\u00E9 de s\u00E9lection, je vous souhaite beaucoup de succ\u00E8s dans vos projets futurs.\n\nCordialement,\n\nProf. Dr {2}\n\nPr\u00E9sident du comit\u00E9\n\nUniversit\u00E9 OpenOlat
