policy.professorship.type.any=L'universit\u00E9 n'impose pas de limite d'\u00E2ge officielle pour les postes de professeurs, mais dans le cas des professeurs assistants, les candidats doivent \u00EAtre \u00E2g\u00E9s de 35 ans ou moins au moment de leur nomination. Pour les postes de professeurs associ\u00E9s et de professeurs titulaires, l'universit\u00E9 cible principalement les scientifiques \u00E2g\u00E9s de 45 ans ou moins au moment de leur nomination.
policy.professorship.type.assistant=L'universit\u00E9 n'impose pas de limite d'\u00E2ge officielle pour les postes de professeurs, mais dans le cas des postes d'assistants, les candidats doivent \u00EAtre \u00E2g\u00E9s de 35 ans ou moins au moment de leur nomination.
policy.professorship.type.explanation=L'universit\u00E9 n'impose pas de limite d'\u00E2ge officielle pour les postes de professeurs, mais dans le cas des professeurs assistants, les candidats doivent \u00EAtre \u00E2g\u00E9s de 35 ans ou moins au moment de leur nomination. Pour les postes de professeurs associ\u00E9s et de professeurs titulaires, l'universit\u00E9 cible principalement les scientifiques \u00E2g\u00E9s de 45 ans ou moins au moment de leur nomination.
