disclaimer.privacy.accept=<strong>J'ai pris connaissance des dispositions relatives \u00E0 la protection des donn\u00E9es et j'accepte le stockage et le traitement de mes donn\u00E9es.</strong>
disclaimer.privacy.text=<h5>Collecte des donn\u00E9es</h5><p>L'utilisation de Selectus entra\u00EEne l'enregistrement de donn\u00E9es. Pour des raisons de tra\u00E7abilit\u00E9, cela s'applique \u00E9galement si le processus est interrompu.</p><p>Des donn\u00E9es personnelles telles que le nom, l'adresse e-mail et l'adresse postale sont collect\u00E9es. Les donn\u00E9es et documents soumis sont visibles par la commission d'\u00E9valuation et, le cas \u00E9ch\u00E9ant, par des experts et des \u00E9valuateurs. En outre, les donn\u00E9es en ligne telles que l'adresse IP, la localisation, la version du navigateur et la date et l'heure d'acc\u00E8s sont enregistr\u00E9es. Ces donn\u00E9es sont stock\u00E9es dans des fichiers journaux \u00E0 des fins de tra\u00E7abilit\u00E9. </p><p>Une fois la proc\u00E9dure termin\u00E9e, les donn\u00E9es sont conserv\u00E9es pendant deux ans suppl\u00E9mentaires, puis d\u00E9finitivement supprim\u00E9es. </p><h5>Transfert de donn\u00E9es</h5><p>Tout le trafic de donn\u00E9es est crypt\u00E9. Les serveurs de stockage des donn\u00E9es appartiennent \u00E0 frentix GmbH et sont situ\u00E9s en Suisse. </p><h5>Suppression ou consultation des donn\u00E9es</h5><p>Veuillez envoyer vos demandes de suppression ou de consultation de vos donn\u00E9es \u00E0 datenschutz@frentix.com. Apr\u00E8s leur suppression, les donn\u00E9es resteront dans les sauvegardes pendant trois mois suppl\u00E9mentaires avant d'\u00EAtre d\u00E9finitivement supprim\u00E9es. Les exportations de donn\u00E9es ne donnent aucun aper\u00E7u de l'\u00E9valuation ou de l'appr\u00E9ciation de votre candidature.</p><h5>Confirmation</h5>
