apply_application.email.referee.mgmt=<p>Notification g\u00E9n\u00E9r\u00E9e automatiquement</p><p>$applicantDearTitleName,</p><p>Nous vous remercions d'avoir postul\u00E9 au poste "$positionTitle". Votre dossier sera transmis au comit\u00E9 de s\u00E9lection.</p><p>Dans le cadre de votre candidature, le comit\u00E9 exige des lettres de recommandation. Veuillez suivre le lien ci-dessous pour vous connecter \u00E0 l'outil de recrutement du corps enseignant et suivre l'\u00E9tat d'avancement de vos demandes de r\u00E9f\u00E9rences. Vous pourrez d\u00E9signer d'autres r\u00E9f\u00E9rents si l'un d'entre eux refuse de soumettre une lettre de recommandation. Les lettres soumises restent confidentielles et ne vous seront pas communiqu\u00E9es.<br>$applicantURL</p><p>L'\u00E9valuation des candidatures prendra un certain temps. Nous vous contacterons d\u00E8s que le comit\u00E9 aura pris sa d\u00E9cision.</p><p>Cordialement,<br>Bureau des affaires professorales</p>
