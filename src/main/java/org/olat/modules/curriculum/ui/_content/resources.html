#if($automationInfos && !$automationInfos.isEmpty())
<div class="o_info_with_icon clearfix">
	<h4>$r.translate("automation.overview")</h4>
	<div class="o_automation">
	#foreach($info in $automationInfos)
		<div><strong>${info.title()}</strong></div><p>${info.date()} (${info.text()})</p>
	#end
	</div>
</div>
#end

$r.render("resources")
#if($r.available("templates"))
<div class="o_block">
	$r.render("templates")
</div>
#end
