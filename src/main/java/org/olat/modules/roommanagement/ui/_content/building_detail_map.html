#if($r.available("leafletLoader"))
$r.render("leafletLoader")
#end
<div class="o_building_detail_map_wrapper">
	#if($geoLat && $geoLon)
	<div id="o_building_detail_map_$r.getCId()" class="o_building_map_container"></div>
	<script>
	(function() {
		var mapId  = 'o_building_detail_map_$r.getCId()';
		var lat    = $geoLat;
		var lng    = $geoLon;
		var color  = '$r.escapeHtml($!colorCss)';
		function initBuildingMap() {
			if (typeof L === 'undefined') { setTimeout(initBuildingMap, 50); return; }
			var el = document.getElementById(mapId);
			if (!el || el._leaflet_id) return;
			var map = L.map(mapId, { zoomControl: false }).setView([lat, lng], 16);
			L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
				attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
				maxZoom: 19
			}).addTo(map);
			var pin = L.divIcon({
				className: '',
				html: '<div class="o_building_map_pin o_color ' + color + '"><i class="o_icon o_icon_location"> </i></div>',
				iconSize: [24, 48],  // font-size: 32px and line-height: 1.5: location icon is 24x48 pixels
				iconAnchor: [12, 38] // line-height: 1.5: vertical padding of 0.25 (12px) with a correction of 2px (icon geometry)
			});
			L.marker([lat, lng], { icon: pin }).addTo(map);
			// Containers that open with a size transition (e.g. a lightbox) can report
			// the wrong size when the map initializes; keep the map in sync with it.
			if (window.ResizeObserver) {
				new ResizeObserver(function() { map.invalidateSize(); }).observe(el);
			}
		}
		initBuildingMap();
	})();
	</script>
	#end
	#if($appleMapsUrl || $googleMapsUrl)
	<div class="o_building_detail_map_actions">
		#if($appleMapsUrl)
		<a href="$r.escapeHtml($appleMapsUrl)" target="_blank" rel="noopener noreferrer" class="btn btn-default">
			<i class="o_icon o_icon-fw o_icon_arrow_up_right_from_square"> </i>$r.translate("building.apple.maps")
		</a>
		#end
		#if($googleMapsUrl)
		<a href="$r.escapeHtml($googleMapsUrl)" target="_blank" rel="noopener noreferrer" class="btn btn-default">
			<i class="o_icon o_icon-fw o_icon_arrow_up_right_from_square"> </i>$r.translate("building.google.maps")
		</a>
		#end
	</div>
	#end
</div>
