<div class="o_block o_building_detail clearfix">
	<div class="o_block_title o_building_detail_title">
		<div class="o_building_rect_container">
			#if($colorCss)
			<div class="o_building_rect o_color_background $r.escapeHtml($colorCss)"> </div>
			#end
		</div>
		<div>
			#if($reference)
			<strong class="o_building_detail_ref">$r.escapeHtml($reference)</strong>
			#end
			#if($description)
			<span class="o_building_detail_desc text-muted"> &middot; $r.escapeHtml($description)</span>
			#end
		</div>
		<div>
			<span class="o_labeled o_building_status_$r.escapeHtml($statusName) o_building_detail_status">
				<i class="o_icon o_icon-fw o_icon_building_status_$r.escapeHtml($statusName)"> </i>
				<span>$r.escapeHtml($statusLabel)</span>
			</span>
		</div>
		<div class="o_building_edit_cmd">
			$r.render("building.detail.edit")
		</div>
	</div>
</div>
