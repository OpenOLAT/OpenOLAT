<div class="o_rm_scheduling_details">
	<div class="o_flex_header">
		<div class="o_event_title">
			<h3>$r.escapeHtml($title)</h3>
			#if($r.isNotEmpty($externalRef))<h3><small> · $r.escapeHtml($externalRef)</small></h3>#end
		</div>
		<div class="o_event_status">
			$lectureBlockStatusBadge
		</div>
		<div class="o_button_group o_button_group_right">
			$r.render("openInCoursePlanner")
		</div>
	</div>
	#if($r.available("lecture.subjects"))
	<div class="o_lecture_subjects">
		$r.render("lecture.subjects")
	</div>
	#end
</div>
