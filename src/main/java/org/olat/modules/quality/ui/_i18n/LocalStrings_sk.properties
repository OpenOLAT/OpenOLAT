reminder.reminder2.body2=<h1>$title</h1>Dobr\u00FD de\u0148<br><br>T\u00FDmto v\u00E1s poz\u00FDvame na \u00FA\u010Das\u0165 v prieskume \u201E$title\u201C.<br><br><div class\="o_email_button_group"><a class\="o_email_button" href\="$url">Otvori\u0165 prieskum</a></div><br><br>Zdvorilo sme v\u00E1s pozvali na <b>$invitation</b> \u00FA\u010Das\u0165 v prieskume, ktor\u00FD v\u00E1m bol zaslan\u00FD. Bohu\u017Eia\u013E, zatia\u013E sme nedostali va\u0161e odpovede. Pros\u00EDm, venujte \u010Do najsk\u00F4r \u010Das vyplneniu dotazn\u00EDka. Va\u0161a sp\u00E4tn\u00E1 v\u00E4zba n\u00E1m pom\u00F4\u017Ee neust\u00E1le zlep\u0161ova\u0165 na\u0161e slu\u017Eby ako vzdel\u00E1vacej in\u0161tit\u00FAcie.<br><br><strong>Predmet hodnotenia\: $topictype $topic</strong>$context<br><br>Prieskum kon\u010D\u00ED d\u0148a <strong>$deadline</strong>. Po tomto d\u00E1tume u\u017E \u00FA\u010Das\u0165 na prieskume nebude mo\u017En\u00E1.<br><br>\u010Eakujeme ve\u013Emi pekne\!<br><br>S pozdravom,<br>V\u00E1\u0161 pracovn\u00EDk pre riadenie kvality
