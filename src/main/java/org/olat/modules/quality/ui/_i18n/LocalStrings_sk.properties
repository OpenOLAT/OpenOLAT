qualitative.feedback.body2=<h1>$title</h1>Dobr\u00FD de\u0148<br><br>V prieskume \u201E$title\u201C bola zanechan\u00E1 kvalitat\u00EDvna sp\u00E4tn\u00E1 v\u00E4zba.<br><br><div class\="o_email_button_group"><a class\="o_email_button" href\="$url">K sp\u00E4tnej v\u00E4zbe</a></div><br><br>Toto je prieskum s nasleduj\u00FAcimi parametrami\:<br><br><strong>Predmet hodnotenia\: $topictype $topic</strong>$context<br><br>S pozdravom<br>V\u00E1\u0161 pracovn\u00EDk pre riadenie kvality<br>
reminder.announcement.coach.context.body2=<h1>$title</h1>Dobr\u00FD de\u0148<br><br>Radi by sme v\u00E1s informovali, \u017Ee hodnotenie v\u00E1\u0161ho kurzu je napl\u00E1novan\u00E9 na $start. Pros\u00EDm, vyhra\u010Fte si na toto hodnotenie nejak\u00FD \u010Das.<br><br><strong>T\u00E9ma hodnotenia\: $topictype $topic</strong>$context<br><br>\u010Eakujeme za spolupr\u00E1cu a prajeme pekn\u00FD de\u0148.<br><br>S pozdravom<br>V\u00E1\u0161 pracovn\u00EDk pre riadenie kvality
reminder.announcement.coach.topic.body2=<h1>$title</h1>Dobr\u00FD de\u0148<br><br>Radi by sme v\u00E1s informovali, \u017Ee va\u0161a trieda bude hodnoti\u0165 va\u0161u v\u00FDu\u010Dbu na $start. \u017Diadame v\u00E1s, aby ste si na toto hodnotenie vyhradili \u010Das.<br><br><strong>T\u00E9ma hodnotenia\: $topictype $topic</strong>$context<br><br>\u010Eakujeme za spolupr\u00E1cu a prajeme pekn\u00FD de\u0148.<br><br>S pozdravom<br>V\u00E1\u0161 pracovn\u00EDk pre riadenie kvality
reminder.invitation.body2=<h1>$title</h1>Dobr\u00FD de\u0148<br><br>T\u00FDmto v\u00E1s poz\u00FDvame na \u00FA\u010Das\u0165 v prieskume \u201E$title\u201C.<br><br><div class\="o_email_button_group"><a class\="o_email_button" href\="$url">Otvori\u0165 prieskum</a></div><br><br>Va\u0161e odpovede n\u00E1m pom\u00F4\u017Eu neust\u00E1le zlep\u0161ova\u0165 na\u0161e slu\u017Eby ako vzdel\u00E1vacej in\u0161tit\u00FAcie.<br><br><strong>Predmet hodnotenia\: $topictype $topic</strong>$context<br><br>Prieskum kon\u010D\u00ED d\u0148a <strong>$deadline</strong>. Po uplynut\u00ED tejto doby u\u017E \u00FA\u010Das\u0165 nebude mo\u017En\u00E1.<br><br>\u010Eakujeme\!<br><br>S pozdravom<br>V\u00E1\u0161 pracovn\u00EDk pre riadenie kvality
reminder.reminder1.body2=<h1>$title</h1>Dobr\u00FD de\u0148<br><br>T\u00FDmto v\u00E1s poz\u00FDvame na \u00FA\u010Das\u0165 v prieskume \u201E$title\u201C.<br><br><div class\="o_email_button_group"><a class\="o_email_button" href\="$url">Otvori\u0165 prieskum</a></div><br><br>Zdvorilo sme v\u00E1s pozvali na <b>$invitation</b> \u00FA\u010Das\u0165 v prieskume, ktor\u00FD v\u00E1m bol zaslan\u00FD. Bohu\u017Eia\u013E, zatia\u013E sme nedostali va\u0161e odpovede. Venujte, pros\u00EDm, \u010Das vyplneniu dotazn\u00EDka. Pom\u00F4\u017Ee n\u00E1m to neust\u00E1le zlep\u0161ova\u0165 na\u0161e slu\u017Eby ako vzdel\u00E1vacej in\u0161tit\u00FAcie.<br><br><strong>Predmet hodnotenia\: $topictype $topic</strong>$context<br><br>Prieskum kon\u010D\u00ED d\u0148a <strong>$deadline</strong>. Po tomto d\u00E1tume u\u017E \u00FA\u010Das\u0165 na prieskume nebude mo\u017En\u00E1.<br><br>\u010Eakujeme ve\u013Emi pekne\!<br><br>S pozdravom<br>V\u00E1\u0161 pracovn\u00EDk pre riadenie kvality
